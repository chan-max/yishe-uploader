name: Build and Release EXE

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'scripts/build-exe.js'
      - 'scripts/build-installer.js'
      - 'scripts/installers/**'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            allow_failure: false
          - os: macos-14
            allow_failure: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Read version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          TAG="v$VERSION"
          git fetch --tags --force
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists. Skipping build."
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Setup Python for macOS build
        if: startsWith(matrix.os, 'macos-') && env.TAG_EXISTS == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python for macOS build
        if: startsWith(matrix.os, 'macos-') && env.TAG_EXISTS == 'false'
        shell: bash
        run: |
          python --version
          which python

      - name: Print runner information
        if: env.TAG_EXISTS == 'false'
        shell: bash
        run: |
          uname -a
          uname -m
          node -p "process.platform + ' ' + process.arch"

      - name: Install dependencies
        if: env.TAG_EXISTS == 'false'
        run: npm ci

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest' && env.TAG_EXISTS == 'false'
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build Release Bundle
        if: env.TAG_EXISTS == 'false'
        env:
          PYTHON: python
        run: npm run build:exe

      - name: Build Installer
        if: env.TAG_EXISTS == 'false'
        run: npm run build:installer

      - name: Prepare Release Asset (Windows)
        if: matrix.os == 'windows-latest' && env.TAG_EXISTS == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release_assets"
          Copy-Item -Path "dist/installers/*.exe" -Destination "release_assets\"
          "ASSET_DIR=release_assets" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Release Asset (macOS)
        if: startsWith(matrix.os, 'macos-') && env.TAG_EXISTS == 'false'
        shell: bash
        run: |
          mkdir -p release_assets
          cp dist/installers/*.pkg release_assets/
          echo "ASSET_DIR=release_assets" >> $GITHUB_ENV

      - name: Upload Artifact
        if: env.TAG_EXISTS == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: ${{ env.ASSET_DIR }}/*

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout for version information
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          echo "Downloaded artifacts:"
          ls -lah artifacts
          if ! find artifacts -maxdepth 1 -type f | grep -q .; then
            echo "No release asset files were downloaded."
            exit 1
          fi

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v$VERSION"
          git fetch --tags --force
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create Tag and Push
        if: env.TAG_EXISTS == 'false'
        run: |
          TAG="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create Release
        if: env.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: artifacts/*
          generate_release_notes: true
